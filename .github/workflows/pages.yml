name: Build and deploy site

on:
  # Ricostruisce a ogni push su main.
  push:
    branches: ["main"]
  # Ricostruisce ogni giorno alle 08:00 UTC: i post datati "oggi" (09:00 +0200
  # = 07:00 UTC) diventano visibili, perché Jekyll esclude i post con data futura.
  schedule:
    - cron: "0 8 * * *"
  # Permette di lanciare la build a mano dalla tab Actions.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Una sola pubblicazione alla volta.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
