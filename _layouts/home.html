---
layout: default
---
<section class="hero">
  <div class="wrap">
    <p class="eyebrow">Curiosità quotidiane</p>
    <h1 class="hero-title">{{ site.title }}</h1>
    <div class="hero-tagline">{{ content }}</div>
  </div>
</section>

<section class="wrap">
  <div class="card-grid">
    {% for post in site.posts %}
      {% include post-card.html post=post %}
    {% endfor %}
  </div>
</section>
